# Joint SSMT — Spectral estimation config (trial-structured)
#
# Trial-structured data typically uses shorter windows and coarser
# frequency grids to keep computation tractable across many trials.

# Frequency grid
freq_min: 1.0
freq_max: 61.0
freq_step: 2.0         # coarser grid: [1, 3, 5, ..., 59] Hz

# Multitaper window
window_sec: 0.4        # shorter windows for trial data
time_bandwidth: 1.0    # NW = 1 → single taper (maximum temporal resolution)

# EM warm-start
em_max_iter: 5000
em_tol: 1.0e-3
